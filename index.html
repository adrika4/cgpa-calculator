<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CGPA Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>CGPA Calculator</h1>

  <table id="subjectTable">
    <thead>
      <tr>
        <th>Subject</th>
        <th>Credits</th>
        <th>Grade</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>AP</td>
        <td><input type="number" class="credits" value="4"></td>
        <td>
          <select class="grade">
            <option value="10">O</option>
            <option value="9">A+</option>
            <option value="8" selected>A</option>
            <option value="7">B+</option>
            <option value="6">B</option>
            <option value="5">C</option>
            <option value="0">F</option>
          </select>
        </td>
      </tr>
      <tr>
        <td>AM</td>
        <td><input type="number" class="credits" value="4"></td>
        <td>
          <select class="grade">
            <option value="10">O</option>
            <option value="9">A+</option>
            <option value="8" selected>A</option>
            <option value="7">B+</option>
            <option value="6">B</option>
            <option value="5">C</option>
            <option value="0">F</option>
          </select>
        </td>
      </tr>
      <tr>
        <td>MP</td>
        <td><input type="number" class="credits" value="4"></td>
        <td>
          <select class="grade">
            <option value="10">O</option>
            <option value="9">A+</option>
            <option value="8" selected>A</option>
            <option value="7">B+</option>
            <option value="6">B</option>
            <option value="5">C</option>
            <option value="0">F</option>
          </select>
        </td>
      </tr>
      <tr>
        <td>ES</td>
        <td><input type="number" class="credits" value="4"></td>
        <td>
          <select class="grade">
            <option value="10">O</option>
            <option value="9">A+</option>
            <option value="8" selected>A</option>
            <option value="7">B+</option>
            <option value="6">B</option>
            <option value="5">C</option>
            <option value="0">F</option>
          </select>
        </td>
      </tr>
      <tr>
        <td>AC</td>
        <td><input type="number" class="credits" value="4"></td>
        <td>
          <select class="grade">
            <option value="10">O</option>
            <option value="9">A+</option>
            <option value="8" selected>A</option>
            <option value="7">B+</option>
            <option value="6">B</option>
            <option value="5">C</option>
            <option value="0">F</option>
          </select>
        </td>
      </tr>
    </tbody>
  </table>

  <button id="calculateBtn">Calculate GPA</button>
  <p id="result"></p>

  <button id="saveBtn">Save Semester</button>
  <p id="cgpaResult"></p>
  <h2>What If — Simulate Future Semester</h2>
<label>Planned credits: <input type="number" id="whatifCredits" value="20"></label>
<label>Target GPA: <input type="number" id="whatifGPA" value="8.5" step="0.1"></label>
<button id="whatifBtn">Simulate</button>
<p id="whatifResult"></p>

  <script src="script.js"></script>
</body>
</html>
